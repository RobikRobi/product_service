services:
    products_service:
      image: project_products_service:latest
      build:
        context: .
      container_name: products_service
      ports:
        - "8002:8002"
      environment:
        INSTANCE_NAME: products_service
        USERS_SERVICE_URL: ${USERS_SERVICE_URL}
        PRODUCT_DATABASE_URL: ${PRODUCT_DATABASE_URL}

