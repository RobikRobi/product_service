services:
  product_nginx:
    image: nginx:1.27-alpine
    container_name: product_nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - product_service_1
      - product_service_2

  product_service_1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product_service_1
    restart: unless-stopped
    environment:
      INSTANCE_NAME: product_service_1
      USERS_SERVICE_URL: ${USERS_SERVICE_URL}
      PRODUCTS_DB_PATH: /data/products.db
    volumes:
      - products_data:/data
    expose:
      - "8002"

  product_service_2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product_service_2
    restart: unless-stopped
    environment:
      INSTANCE_NAME: product_service_2
      USERS_SERVICE_URL: ${USERS_SERVICE_URL}
      PRODUCTS_DB_PATH: /data/products.db
    volumes:
      - products_data:/data
    expose:
      - "8002"

volumes:
  products_data:
